<div class="content-container">
  <div
    class="entry-actions"
    style="margin-bottom: 20px; display: flex; align-items: flex-end">
    <div style="display: flex; flex-direction: column">
      <label for="dagw-monthly-month-select" style="font-weight: 700">Month Type</label>
      <mat-form-field class="mat-custom">
        <mat-select id="dagw-monthly-month-select" [(ngModel)]="monthSelected" placeholder="Select Month Type">
          @for (month of months; track month) {
            <mat-option [value]="month.month_value">
              {{ month.month_name }}
            </mat-option>
          }
        </mat-select>
        <mat-icon style="padding: unset !important" matSuffix
          >keyboard_arrow_down</mat-icon
        >
      </mat-form-field>
    </div>

    <div style="display: flex; flex-direction: column">
      <label for="dagw-monthly-depot-select" style="font-weight: 700">Depot Name</label>
      <mat-form-field class="mat-custom" style="width: 320px">
        <mat-select
          id="dagw-monthly-depot-select"
          [(ngModel)]="depotSelected"
          placeholder="Select Depot"
          multiple>
          @for (depot of depots; track depot) {
            <mat-option [value]="depot.depot_id">
              {{ depot.depot_name }}
            </mat-option>
          }
        </mat-select>
        <mat-icon style="padding: unset !important" matSuffix
          >keyboard_arrow_down</mat-icon
        >
      </mat-form-field>
    </div>

    <div class="button-filter" style="margin-left: auto">
      <div class="item">
        <button
          type="button"
          (click)="onViewReport()"
          mat-flat-button
          id="btndescription"
          [disabled]="isButtonClick || !depotSelected || !monthSelected"
          class="btn description">
          <mat-icon>visibility</mat-icon>
          View Report
        </button>
      </div>
    </div>
  </div>
  <!-- Selected Filter Component -->
  <app-selected-filter />

  <div class="table-wrapper">
    <app-ssrs-reportviewer
      [reportname]="reportName"
      [parameter]="parameterReportViewer"
      [option]="optionReportViewer"
      [reportType]="isAdhocReport ? 'adhoc-report' : 'daily-report'"
      (isIframeLoadedEvent)="
        isIframeLoadedEvent($event)
      "></app-ssrs-reportviewer>
  </div>
</div>
