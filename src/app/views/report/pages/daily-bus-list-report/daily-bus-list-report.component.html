<div class="content-container">
  <div
    class="entry-actions"
    style="margin-bottom: 20px; display: flex; align-items: flex-end">
    <div style="display: flex; flex-direction: column">
      <label for="daily-bus-list-depot-select" style="font-weight: 700">Depot Name</label>
      <mat-form-field class="mat-custom" style="width: 360px">
        <mat-select id="daily-bus-list-depot-select" [(ngModel)]="depotSelected" placeholder="Select Depot">
          @for (depot of depots; track depot) {
            <mat-option [value]="depot.depot_id">
              {{ depot.depot_name }}
            </mat-option>
          }
        </mat-select>
        <mat-icon style="padding: unset !important" matSuffix
          >keyboard_arrow_down</mat-icon
        >
      </mat-form-field>
    </div>

    <div style="display: flex; flex-direction: column">
      <label for="daily-bus-list-sp-select" style="font-weight: 700">SP Name</label>
      <mat-form-field class="mat-custom" style="width: 360px">
        <mat-select id="daily-bus-list-sp-select" [(ngModel)]="spNameSelected" placeholder="Select SP Name">
          @for (operator of operators; track operator) {
            <mat-option [value]="operator.svc_prov_id">
              {{ operator.svc_prov_name }}
            </mat-option>
          }
        </mat-select>
        <mat-icon style="padding: unset !important" matSuffix
          >keyboard_arrow_down</mat-icon
        >
      </mat-form-field>
    </div>

    <div class="button-filter" style="text-align: right">
      <div class="item">
        <button
          type="button"
          (click)="onViewReport()"
          mat-flat-button
          id="btndescription"
          [disabled]="isButtonClick || !depotSelected || !spNameSelected"
          class="btn description">
          <mat-icon>visibility</mat-icon>
          View Report
        </button>
      </div>
    </div>
  </div>
  <!-- Selected Filter Component -->
  <app-selected-filter />

  <div class="table-wrapper">
    <app-ssrs-reportviewer
      [reportname]="reportName"
      [parameter]="parameterReportViewer"
      [option]="optionReportViewer"
      [reportType]="isAdhocReport ? 'adhoc-report' : 'daily-report'"
      (isIframeLoadedEvent)="
        isIframeLoadedEvent($event)
      "></app-ssrs-reportviewer>
  </div>
  <div class="table-footer"></div>
</div>
