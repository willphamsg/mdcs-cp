<div class="content-container">
  <div
    class="entry-actions"
    style="margin-bottom: 20px; display: flex; align-items: flex-end">
    @if (!isAdhocReport) {
      <div style="display: flex; flex-direction: column">
        <label for="bus-partial-upload-date-input" style="font-weight: 700">Business Date</label>
        <mat-form-field d style="width: 320px">
          <input
            id="bus-partial-upload-date-input"
            matInput
            placeholder="Select Date"
            [matDatepicker]="picker"
            [max]="todayJS"
            [(ngModel)]="businessDaySelected" />
          <mat-datepicker-toggle
            matIconSuffix
            [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
          <button
            style="padding: unset !important"
            mat-icon-button
            matSuffix
            (click)="picker.open()">
            <img
              src="assets/icons/calendar_small.svg"
              alt=""
              style="padding: unset !important; width: 16px; height: 16px" />
          </button>
        </mat-form-field>
      </div>
    }

    <div style="display: flex; flex-direction: column">
      <label for="bus-partial-upload-depot-select" style="font-weight: 700">Depot Name</label>
      <mat-form-field class="mat-custom" style="width: 360px">
        <mat-select
          id="bus-partial-upload-depot-select"
          [(ngModel)]="depotSelected"
          placeholder="Select Depot"
          [multiple]="isAdhocReport">
          @for (depot of depots; track depot) {
            <mat-option [value]="depot.depot_id">
              {{ depot.depot_name }}
            </mat-option>
          }
        </mat-select>
        <mat-icon style="padding: unset !important" matSuffix
          >keyboard_arrow_down</mat-icon
        >
      </mat-form-field>
    </div>

    @if (isAdhocReport) {
      <div style="display: flex; flex-direction: column">
        <label for="bus-partial-upload-sp-select" style="font-weight: 700">SP Name</label>
        <mat-form-field class="mat-custom" style="width: 360px">
          <mat-select id="bus-partial-upload-sp-select" [(ngModel)]="spNameSelected" placeholder="Select SP Name">
            @for (operator of operators; track operator) {
              <mat-option [value]="operator.svc_prov_id">
                {{ operator.svc_prov_name }}
              </mat-option>
            }
          </mat-select>
          <mat-icon style="padding: unset !important" matSuffix
            >keyboard_arrow_down</mat-icon
          >
        </mat-form-field>
      </div>
    }

    <div class="button-filter" style="text-align: right">
      <div class="item">
        <button
          type="button"
          (click)="onViewReport()"
          mat-flat-button
          id="btndescription"
          [disabled]="
            isButtonClick ||
            !depotSelected ||
            (!isAdhocReport && !businessDaySelected) ||
            (isAdhocReport && !spNameSelected)
          "
          class="btn description">
          <mat-icon>visibility</mat-icon>
          View Report
        </button>
      </div>
    </div>
  </div>
  <!-- Selected Filter Component -->
  <app-selected-filter />

  <div class="table-wrapper">
    <app-ssrs-reportviewer
      [reportname]="reportName"
      [parameter]="parameterReportViewer"
      [option]="optionReportViewer"
      [reportType]="isAdhocReport ? 'adhoc-report' : 'daily-report'"
      (isIframeLoadedEvent)="
        isIframeLoadedEvent($event)
      "></app-ssrs-reportviewer>
  </div>
</div>
