<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <table mat-table class="stripped" [dataSource]="dataSource">
    <ng-container matColumnDef="param_file_name">
      <th mat-header-cell *matHeaderCellDef>Parameter Filename</th>
      <td mat-cell *matCellDef="let element">{{ element.param_file_name }}</td>
    </ng-container>

    <ng-container matColumnDef="param_payload_version">
      <th mat-header-cell *matHeaderCellDef>Payload Version</th>
      <td mat-cell *matCellDef="let element">
        {{ element.param_payload_version }}
      </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let element">{{ element.status }}</td>
    </ng-container>

    <!-- Header and Row Definitions -->
    <tr
      style="
        background-color: #4a5964;
        font-weight: 600;
        color: white;
        height: 40px;
      "
      mat-header-row
      *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-flat-button color="primary" (click)="confirm()">Download</button>
</mat-dialog-actions>
