<h2 matDialogTitle>{{ title }}</h2>
<mat-dialog-content>
  <span>{{ message }}</span>
  <div>
    @for (message of multiMessage; track message) {
      <ul>
        <li>{{ message }}</li>
      </ul>
    }
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  @if (!okOnly) {
    <button mat-button color="warn" (click)="onDismiss()">No</button>
  }
  <button mat-raised-button color="primary" (click)="onConfirm()">
    Confirm
  </button>
</mat-dialog-actions>
