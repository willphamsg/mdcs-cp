<ul class="breadcrumb">
  @if (showHome) {
    <li>Home</li>
  }

  @if (isMenuArray) {
    @for (item of menuItem; track item) {
      <li>
        <a> {{ item }}</a>
      </li>
    }
  } @else if (!!menuItem) {
    <li>
      <a>{{ menuItem }}</a>
    </li>
  }

  <li>
    <span>{{ headerTitle }}</span>
  </li>
</ul>
